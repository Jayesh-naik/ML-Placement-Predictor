<!DOCTYPE html>
<html>
<head>
    <title>Student Placement Prediction</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
        }

        .container{
            width:450px;
            margin:60px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border-radius:5px;
            border:1px solid #ccc;
        }

        button{
            width:100%;
            padding:12px;
            background:#4CAF50;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
        }

        button:hover{
            background:#45a049;
        }

        .result{
            text-align:center;
            margin-top:20px;
            font-size:20px;
            font-weight:bold;
            color:green;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Student Placement Prediction</h2>

<form action="/predict" method="post">

<label>IQ</label>
<input type="number" name="IQ" required>

<label>CGPA</label>
<input type="number" step="0.01" name="CGPA" required>

<label>10th Marks</label>
<input type="number" name="10th_Marks" required>

<label>12th Marks</label>
<input type="number" name="12th_Marks" required>

<label>Communication Skills</label>
<input type="number" step="0.01" name="Communication_Skills" required>

<button type="submit">Predict Placement</button>

</form>

{% if prediction_text %}
<div class="result">
Prediction : {{ prediction_text }}
</div>
{% endif %}

</div>

</body>
</html>
